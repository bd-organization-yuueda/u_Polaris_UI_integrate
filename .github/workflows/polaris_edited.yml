name: Polaris_SecurityScan

# Not generated from Security App. Manually create the yaml file for Polaris
on:
  push:
    branches: [ main, develop, stage ]
  pull_request:
    branches: [ main, develop, stage ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write               # Required to push changes or create fix branches
  pull-requests: write          # Required to add comments or create fix pull requests
  security-events: write        # Required to upload SARIF results to GitHub Security

jobs:
  polaris:
    runs-on: [ubuntu-latest]
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      # Set up JDK 11 in runtime environment
      - name: Set up JDK 11
        uses: actions/setup-java@v3.0.0
        with:
          java-version: '11'
          distribution: 'adopt'
          
      - name: Polaris Full Scan
        if: ${{ github.event_name != 'pull_request' }}
        uses: blackduck-inc/black-duck-security-scan@latest
        with:
          ### SCANNING: Required fields
          polaris_server_url: ${{ secrets.POLARIS_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          ### ASSESSMENT TYPES
          polaris_assessment_types: SAST,SCA  # Comma-separated list: SAST,SCA,DAST
          ### GITHUB TOKEN
          github_token: ${{ secrets.GITHUB_TOKEN }}  # Required when PR comments or sarif reports enabled
          ### Project's parameters
          polaris_application_name: U_test2
          polaris_project_name: ${{ github.event.repository.name }}_SecurityApp
          # project_directory: ${{ vars.PROJECT_DIRECTORY }}
          ### SCAN CONFIGURATION: Uncomment below to enable
          # polaris_waitForScan: true # Wait for scan completion before proceeding
          ### Mark build status if policy violating issues are found
          # mark_build_status: failure # Set to success, failure, or skip
          ### Uncomment below configuration if Bridge diagnostic files needs to be uploaded
          include_diagnostics: true

          ### SARIF report generation and upload to GitHub Adavanced Security Tab: Uncomment below to enable
          polaris_reports_sarif_create: true  # Create SARIF report and upload it as artifact
          polaris_upload_sarif_report: true   # Upload SARIF report in GitHub Advanced Security tab
          #polaris_reports_sarif_file_path: '/Users/tmp/report.sarif.json' # File path (including file name) where SARIF report is created.
          polaris_reports_sarif_severities: 'CRITICAL,HIGH'
          polaris_reports_sarif_groupSCAIssues: true 
          polaris_reports_sarif_issue_types: 'SAST,SCA'  #'SCA,SAST'

          ### SCA configuration
          # polaris_test_sca_type: 'SCA-SIGNATURE'   # Default is SCA-PACKAGE. You can pick either SCA-PACKAGE or SCA-SIGNATURE
          detect_search_depth: 2
          # detect_args: '--detect.diagnostic=true'
          # detect_config_path: '/Users/Config/application.properties'
          ### SAST Configuration
          # coverity_build_command: mvn clean install
          # coverity_clean_command: mvn clean
          # coverity_config_path: /Users/Config/coverity.yml
          # coverity_args: --config-override capture.build.build-command=mvn install
          # coverity_version: '2025.6.2'

          ### Github Issues
          polaris_externalIssues_create: true
          polaris_externalIssues_types: "SAST,SCA"  # SCA,SAST
          polaris_externalIssues_severities: "CRITICAL,HIGH,MEDIUM,LOW" # Default is 'CRITICAL,HIGH'. CRITICAL,HIGH,MEDIUM,LOW
          polaris_externalIssues_groupSCAIssues: true  # Defaul is true
          polaris_externalIssues_maxCount: 10  # Defaul is 10
          
          ### Uncomment this to use Source Upload method. Default value is hybrid (build based)
          # polaris_test_sast_location: 'remote'
          # polaris_test_sca_location: 'remote'
          # project_source_archive: ${{ vars.PROJECT_SOURCE_ARCHIVE }}
          # project_source_excludes: ${{ vars.PROJECT_SOURCE_EXCLUDES }} # Accepts Multiple Values
          # project_source_preserveSymLinks: true
          ### Uncomment this to use Local Analysis feature
          # Please use Local Analysis or Source Upload exclusively
          # polaris_test_sast_location: 'local'
        
        env: 
          BRIDGE_POLARIS_TEST_SCA_TYPE: 'SCA-PACKAGE,SCA-SIGNATURE'   # Default is SCA-PACKAGE.  polaris_test_sca_typeは2つ指定できないが、こっちは両方選択可能

      - name: Polaris PR Scan
        # id: polaris-pr-scan
        if: ${{ github.event_name == 'pull_request' }}
        uses: blackduck-inc/black-duck-security-scan@latest
        with:
          ### SCANNING: Required fields
          polaris_server_url: ${{ secrets.POLARIS_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          ### ASSESSMENT TYPES
          polaris_assessment_types: 'SAST'  # Comma-separated list: SAST,SCA,DAST
          ### PR SCAN CONFIGURATION
          github_token: ${{ secrets.GITHUB_TOKEN }}  # Required when PR comments or sarif reports enabled
          polaris_prComment_enabled: true
          ### Project's parameters
          polaris_application_name: U_test2
          polaris_project_name: u_Polaris_manual  #${{ github.event.repository.name }}
          polaris_prComment_severities: 'CRITICAL,HIGH'  # Critical, High, Medium, Low, and Informational. Default: high,critical
          # project_directory: ${{ vars.PROJECT_DIRECTORY }}

          ### Uncomment this to use Source Upload method. Default value is hybrid (build based)
          # polaris_test_sast_location: 'remote'
          # polaris_test_sca_location: 'remote'
          # project_source_archive: ${{ vars.PROJECT_SOURCE_ARCHIVE }}
          # project_source_excludes: ${{ vars.PROJECT_SOURCE_EXCLUDES }} # Accepts Multiple Values
          # project_source_preserveSymLinks: true
          #### Uncomment this to use Local Analysis feature
          # Please use Local Analysis or Source Upload exclusively
          # polaris_test_sast_location: 'local'

          ### Mark build status if policy violating issues are found
          # MARK_BUILD_STATUS: 'Success' # Default is failure

          ### Uncomment below configuration if Bridge diagnostic files needs to be uploaded
          # include_diagnostics: true

         ### Uncomment below configuration to add custom logic based on return status
         # - name: cmdLine
         #   id: cmdLine
         #   run: |
         #     EXIT_CODE=${{ steps.polaris-full-scan.outputs.status }}
         #     echo "Polarity Full Scan exit status - $EXIT_CODE"
